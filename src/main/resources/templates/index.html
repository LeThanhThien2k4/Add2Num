<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cộng số lớn</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="mb-4">Cộng 2 số lớn</h2>

<form method="post" action="/sum">
    <div class="mb-3">
        <label>Số thứ nhất</label>
        <input type="text" name="num1" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Số thứ hai</label>
        <input type="text" name="num2" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Tính</button>
</form>

<!-- Hiển thị kết quả -->
<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
<div class="mt-4" th:if="${result}">
    <h4>Kết quả:</h4>
<p th:text="|${num1} + ${num2} = ${result}|"></p></div>

</body>
</html>
